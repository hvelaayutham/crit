# Deploy a static prototype to GitHub Pages with Crit injected.
# Copy into .github/workflows/ and adjust the build step for your stack.
name: Deploy prototype
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Your build step here. For plain HTML, skip and set dir: .
      # - run: npm ci && npm run build

      - name: Inject Crit
        uses: hvelaayutham/crit/packages/action@main
        with:
          dir: ./dist
          relay: https://crit-relay.YOURNAME.workers.dev

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v4
